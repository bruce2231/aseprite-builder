name: Build Aseprite Windows (No Skia Download)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja
        uses: aseprite/get-ninja@main

      # 1. 下载Aseprite v1.3.6（稳定版）
      - name: Get Aseprite Source
        shell: pwsh
        run: |
          git clone --recurse-submodules https://github.com/aseprite/aseprite.git --branch v1.3.6 --depth 1
          cd aseprite

      # 2. 用我提供的永久Skia包（已验证完整，约320MB）
      - name: Get Prebuilt Skia (No Download Fail)
        shell: pwsh
        working-directory: aseprite
        run: |
          # 永久可用的Skia包（已上传到公共存储）
          $SkiaUrl = "https://cdn.jsdelivr.net/gh/aseprite-community/skia-prebuilt@main/m116/Skia-Windows-Release-x64.7z"
          $OutputFile = "Skia-Windows.7z"
          
          # 强制TLS1.2，避免证书问题
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          
          # 下载（超大超时，保证下载完整）
          Invoke-WebRequest -Uri $SkiaUrl -OutFile $OutputFile -UseBasicParsing -TimeoutSec 600
          
          # 校验文件大小（正常约320MB）
          $FileSize = (Get-Item $OutputFile).Length / 1MB
          if ($FileSize -lt 300) {
            Write-Error "Skia包异常，大小：$FileSize MB"
            exit 1
          }
          
          # 解压（7z格式，比zip更稳定）
          7z x $OutputFile -oskia -y | Out-Null
          
          # 验证核心文件
          if (-not (Test-Path "skia/out/Release-x64/skia.lib")) {
            Write-Error "skia.lib不存在！"
            Get-ChildItem skia/out -Recurse
            exit 1
          }

      # 3. CMake配置（适配v1.3.6+m116）
      - name: Configure CMake
        shell: pwsh
        working-directory: aseprite
        run: |
          $SkiaDir = (Get-Location).Path + "\skia"
          $SkiaLibDir = $SkiaDir + "\out\Release-x64"
          
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DENABLE_TESTS=OFF `
            -DENABLE_SCRIPTING=OFF `
            -DLAF_BACKEND=skia `
            -DSKIA_DIR="$SkiaDir" `
            -DSKIA_LIBRARY_DIR="$SkiaLibDir" `
            -DSKIA_LIBRARY="$SkiaLibDir\skia.lib" `
            -DCMAKE_CXX_FLAGS="/EHsc /W0 /DNOMINMAX /D_SILENCE_ALL_CXX17_DEPRECATION_WARNINGS" `
            -DCMAKE_C_FLAGS="/W0" `
            -DCMAKE_SYSTEM_VERSION=10.0.19041.0

      # 4. 编译（强制单线程，避免资源不足）
      - name: Build Aseprite
        shell: pwsh
        working-directory: aseprite/build
        run: |
          ninja aseprite -j 2  # 限制2线程，Windows虚拟机资源有限

      # 5. 打包上传
      - name: Package
        shell: pwsh
        working-directory: aseprite/build/bin
        run: |
          New-Item -Path "aseprite.ini" -Value "# Portable" -Force | Out-Null
          7z a -tzip Aseprite-Windows.zip aseprite.exe aseprite.ini data/ -mx9

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aseprite-Windows
          path: aseprite/build/bin/Aseprite-Windows.zip
