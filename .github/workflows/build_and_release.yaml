name: Build Aseprite Windows

on:
  workflow_dispatch:  # 只保留手动触发，避免自动触发干扰

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      # 1. 基础环境准备
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja
        uses: aseprite/get-ninja@main

      # 2. 下载Aseprite源码（固定版本，避免自动拉取不兼容版本）
      - name: Get Aseprite Source
        shell: pwsh
        run: |
          git clone --recurse-submodules https://github.com/aseprite/aseprite.git --branch v1.3.7
          cd aseprite

      # 3. 下载Skia（用PowerShell下载，比curl更稳定，加校验）
      - name: Download Skia (Stable Version)
        shell: pwsh
        working-directory: aseprite
        run: |
          # 用官方稳定版Skia，绝对能下载
          $SkiaUrl = "https://github.com/aseprite/skia/releases/download/m122-14f25e82e0/Skia-Windows-Release-x64.zip"
          $OutputFile = "Skia-Windows-Release-x64.zip"
          
          # PowerShell下载（比curl更适配Windows，带进度+重试）
          Invoke-WebRequest -Uri $SkiaUrl -OutFile $OutputFile -UseBasicParsing -RetryIntervalSec 5 -MaximumRetryCount 3
          
          # 校验文件大小（正常约350MB）
          $FileSize = (Get-Item $OutputFile).Length / 1MB
          if ($FileSize -lt 300) {
            Write-Error "Skia包太小，下载失败！当前大小：$FileSize MB"
            exit 1
          }
          
          # 解压（PowerShell原生解压，避免unzip命令问题）
          Expand-Archive -Path $OutputFile -DestinationPath skia -Force
          
          # 验证关键文件
          if (-not (Test-Path "skia/out/Release-x64/skia.lib")) {
            Write-Error "skia.lib不存在！"
            exit 1
          }

      # 4. CMake配置（极简参数，只保留必须项）
      - name: Configure CMake
        shell: pwsh
        working-directory: aseprite
        run: |
          $SkiaDir = (Get-Location).Path + "\skia"
          $SkiaLibDir = $SkiaDir + "\out\Release-x64"
          
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DENABLE_TESTS=OFF `
            -DENABLE_SCRIPTING=ON `
            -DLAF_BACKEND=skia `
            -DSKIA_DIR="$SkiaDir" `
            -DSKIA_LIBRARY_DIR="$SkiaLibDir" `
            -DSKIA_LIBRARY="$SkiaLibDir\skia.lib" `
            -DCMAKE_CXX_FLAGS="/EHsc /W0" `
            -DCMAKE_C_FLAGS="/W0"

      # 5. 编译（只编译aseprite主程序，不编译测试等无关项）
      - name: Build Aseprite
        shell: pwsh
        working-directory: aseprite/build
        run: |
          ninja aseprite

      # 6. 打包上传（验证产物）
      - name: Package & Upload
        shell: pwsh
        working-directory: aseprite/build/bin
        run: |
          # 生成便携版配置
          New-Item -Path "aseprite.ini" -Value "# Portable Mode" -Force
          
          # 打包
          7z a -tzip Aseprite-Windows.zip *
          
          # 上传为artifact（方便你下载测试）
          echo "::set-output name=artifact_path::$(Get-Location)\Aseprite-Windows.zip"
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aseprite-Windows
          path: aseprite/build/bin/Aseprite-Windows.zip
